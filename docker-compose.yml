services:
  postgres:
    image: postgres:16-alpine
    container_name: msl-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-msl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-msl_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-msl_platform}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - msl_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-msl} -d ${POSTGRES_DB:-msl_platform}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: msl-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - msl_redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  msl_pgdata:
  msl_redisdata:
