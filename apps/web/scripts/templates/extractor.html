<!doctype html>
<html lang="mn">
  <head>
    <meta charset="utf-8" />
    <title>MSL template extractor</title>
  </head>
  <body>
    <pre id="log">эхэлж байна…</pre>
    <script type="module">
      // Offline эталон гаргагч. Playwright (headless Chromium) энэ хуудсыг ачаалж,
      // ./manifest.json доторх клипүүдийг MediaPipe Holistic-оор боловсруулж,
      // sign-test-тэй ЯГ ИЖИЛ 94 хэмжээст фичер дараалал гаргаад 32 фреймд
      // жигдрүүлнэ. Үр дүнг window.__RESULT__-д тавьж, window.__DONE__ = true болгоно.
      import {
        FilesetResolver,
        HolisticLandmarker,
      } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/vision_bundle.mjs";

      const WASM_URL =
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.35/wasm";
      const MODEL_URL =
        "https://storage.googleapis.com/mediapipe-models/holistic_landmarker/holistic_landmarker/float16/latest/holistic_landmarker.task";

      // ----- sign-test/lib/features.js-тэй ижил тогтмол ба логик -----
      const L_SHOULDER = 11;
      const R_SHOULDER = 12;
      const POSE_KEYS = [0, 13, 14, 15, 16];
      const POSE_DIM = POSE_KEYS.length * 2; // 10
      const HAND_DIM = 21 * 2; // 42
      const VEC_DIM = POSE_DIM + HAND_DIM * 2; // 94
      const SEQ_LEN = 32;

      const first = (arr) => (arr && arr.length ? arr[0] : null);

      function hasHands(result) {
        if (!result) return false;
        const l = first(result.leftHandLandmarks);
        const r = first(result.rightHandLandmarks);
        return !!(l && l.length) || !!(r && r.length);
      }

      function resultToVector(result) {
        if (!result) return null;
        const pose = first(result.poseLandmarks);
        if (!pose || pose.length <= R_SHOULDER) return null;
        const ls = pose[L_SHOULDER];
        const rs = pose[R_SHOULDER];
        if (!ls || !rs) return null;

        const cx = (ls.x + rs.x) / 2;
        const cy = (ls.y + rs.y) / 2;
        const scale = Math.hypot(ls.x - rs.x, ls.y - rs.y) || 1e-6;

        const vec = new Array(VEC_DIM).fill(0);
        let o = 0;
        for (const k of POSE_KEYS) {
          const p = pose[k];
          if (p) {
            vec[o] = (p.x - cx) / scale;
            vec[o + 1] = (p.y - cy) / scale;
          }
          o += 2;
        }
        const lh = first(result.leftHandLandmarks);
        if (lh && lh.length === 21) {
          for (let i = 0; i < 21; i++) {
            vec[o + i * 2] = (lh[i].x - cx) / scale;
            vec[o + i * 2 + 1] = (lh[i].y - cy) / scale;
          }
        }
        o += HAND_DIM;
        const rh = first(result.rightHandLandmarks);
        if (rh && rh.length === 21) {
          for (let i = 0; i < 21; i++) {
            vec[o + i * 2] = (rh[i].x - cx) / scale;
            vec[o + i * 2 + 1] = (rh[i].y - cy) / scale;
          }
        }
        return vec;
      }

      function resample(seq, N = SEQ_LEN) {
        if (seq.length === 0) return [];
        if (seq.length === N) return seq;
        if (seq.length === 1) return new Array(N).fill(seq[0]);
        const out = new Array(N);
        for (let i = 0; i < N; i++) {
          const idx = Math.round((i * (seq.length - 1)) / (N - 1));
          out[i] = seq[idx];
        }
        return out;
      }

      const logEl = document.getElementById("log");
      const log = (m) => {
        logEl.textContent = m;
        console.log(m);
      };

      function extractSeqFromVideo(url, landmarker) {
        return new Promise((resolve, reject) => {
          const v = document.createElement("video");
          v.src = url;
          v.muted = true;
          v.playsInline = true;
          v.crossOrigin = "anonymous";
          const seq = [];
          const collect = (res) => {
            const vec = resultToVector(res);
            if (vec && hasHands(res)) seq.push(vec);
          };
          const onFrame = () => {
            if (v.readyState >= 2) {
              collect(landmarker.detectForVideo(v, performance.now()));
            }
            if (!v.ended) v.requestVideoFrameCallback(onFrame);
          };
          v.onended = () => resolve(seq);
          v.onerror = () =>
            reject(new Error("видео ачаалж чадсангүй: " + url));
          v.onloadeddata = () => {
            v.play()
              .then(() => {
                if (v.requestVideoFrameCallback) v.requestVideoFrameCallback(onFrame);
                else {
                  const tick = () => {
                    if (v.ended) return resolve(seq);
                    collect(landmarker.detectForVideo(v, performance.now()));
                    setTimeout(tick, 33);
                  };
                  tick();
                }
              })
              .catch(reject);
          };
        });
      }

      async function main() {
        try {
          log("manifest ачаалж байна…");
          const manifest = await (await fetch("./manifest.json")).json();

          log("MediaPipe модель ачаалж байна…");
          const vision = await FilesetResolver.forVisionTasks(WASM_URL);
          const opts = (delegate) => ({
            baseOptions: { modelAssetPath: MODEL_URL, delegate },
            runningMode: "VIDEO",
            minHandLandmarksConfidence: 0.3,
            minPoseDetectionConfidence: 0.4,
            minPosePresenceConfidence: 0.4,
            minFaceDetectionConfidence: 0.4,
          });
          let landmarker;
          try {
            landmarker = await HolisticLandmarker.createFromOptions(vision, opts("GPU"));
          } catch (e) {
            console.warn("GPU бүтэлгүйтэв, CPU:", e);
            landmarker = await HolisticLandmarker.createFromOptions(vision, opts("CPU"));
          }

          const out = [];
          window.__PROGRESS__ = { done: 0, total: manifest.length, last: "" };
          for (let i = 0; i < manifest.length; i++) {
            const item = manifest[i];
            log(`(${i + 1}/${manifest.length}) ${item.label} — ${item.url}`);
            let seq = [];
            try {
              seq = await extractSeqFromVideo(item.url, landmarker);
              if (seq.length < 6) {
                // халаалтаас фрейм алдсан байж болзошгүй — нэг дахин оролдоно
                seq = await extractSeqFromVideo(item.url, landmarker);
              }
            } catch (clipErr) {
              console.warn("клип алдаа:", item.url, clipErr);
            }
            out.push({
              id: item.id,
              label: item.label,
              frames: seq.length,
              seq: resample(seq, SEQ_LEN),
            });
            window.__PROGRESS__ = {
              done: i + 1,
              total: manifest.length,
              last: item.label,
            };
            window.__PARTIAL__ = out;
          }

          window.__RESULT__ = { seqLen: SEQ_LEN, dim: VEC_DIM, items: out };
          log("DONE: " + out.length + " клип");
          window.__DONE__ = true;
        } catch (e) {
          console.error(e);
          window.__ERROR__ = String((e && e.stack) || e);
          window.__DONE__ = true;
          log("ERROR: " + e);
        }
      }
      main();
    </script>
  </body>
</html>
